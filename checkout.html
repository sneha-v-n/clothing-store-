<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<h2 class="mb-4">Checkout</h2>

<div class="row">

<!-- SHIPPING -->
<div class="col-md-6">

<h4>Shipping Details</h4>

<input class="form-control mb-3" placeholder="Full Name">

<input class="form-control mb-3" placeholder="Email">

<input class="form-control mb-3" placeholder="Phone">

<input class="form-control mb-3" placeholder="Address">

<input class="form-control mb-3" placeholder="City">

<input class="form-control mb-3" placeholder="Pincode">

</div>


<!-- ORDER SUMMARY -->
<div class="col-md-6">

<h4>Order Summary</h4>

<div id="orderSummary"></div>

<h5 class="mt-3">
Total: ₹<span id="orderTotal">0</span>
</h5>

<button class="btn btn-dark w-100 mt-3" onclick="placeOrder()">
Place Order
</button>

</div>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cartItems")) || [];

let summary = document.getElementById("orderSummary");

let total = 0;

cart.forEach(item =>{

summary.innerHTML += `
<div class="d-flex justify-content-between mb-2">
<span>${item.name}</span>
<span>₹${item.price}</span>
</div>
`;

total += item.price;

});

document.getElementById("orderTotal").innerText = total;


function placeOrder(){

alert("🎉 Order placed successfully!");

localStorage.removeItem("cartItems");

window.location.href="index.html";

}

</script>

</body>
</html>
